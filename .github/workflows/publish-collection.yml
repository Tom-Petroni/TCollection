name: Publish TCollection

on:
  workflow_dispatch:
    inputs:
      statuses:
        description: "Comma-separated node statuses to include"
        required: false
        default: "stable"
      package_version:
        description: "Optional collection version override"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          VERSION_INPUT="${{ github.event.inputs.package_version }}"
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(tr -d '\r\n' < VERSION)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Assemble TCollection from node releases
        run: |
          python tools/assemble_collection.py \
            --source github-release \
            --statuses "${{ github.event.inputs.statuses || 'stable' }}" \
            --package-version "${{ steps.version.outputs.version }}"

      - name: Upload assembled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tcollection-bundles
          path: dist
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TCollection-v${{ steps.version.outputs.version }}.zip
            dist/latest.json
          generate_release_notes: true
