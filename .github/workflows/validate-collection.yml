name: Validate TCollection

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync generated files
        run: |
          python tools/sync_node_lock.py
          python tools/sync_manifest.py
          python tools/sync_node_catalog.py

      - name: Validate metadata
        run: python tools/validate_collection.py

      - name: Python syntax check
        run: python -m compileall tcollection tools init.py menu.py tcollection_bootstrap.py

      - name: Assemble stable collection from GitHub node releases
        env:
          TCOLLECTION_NODE_REPO_TOKEN: ${{ secrets.TCOLLECTION_NODE_REPO_TOKEN }}
        run: python tools/assemble_collection.py --source github-release --statuses stable --output dist_ci

      - name: Verify release-oriented outputs exist
        shell: bash
        run: |
          test -f dist_ci/latest.json
          test -f dist_ci/SHA256SUMS.txt
          ls dist_ci/TCollection-v*.zip >/dev/null

      - name: Ensure generated files are committed
        run: git diff --exit-code -- config/node_lock.json tcollection/manifest.json nodes/catalog.json docs/NODE_CATALOG_FR.md
