name: Validate TCollection

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync generated files
        run: |
          python tools/sync_node_lock.py
          python tools/sync_manifest.py

      - name: Validate metadata
        run: python tools/validate_collection.py

      - name: Ensure generated files are committed
        run: git diff --exit-code -- config/node_lock.json tcollection/manifest.json
